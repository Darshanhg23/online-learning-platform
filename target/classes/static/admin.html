<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel — LearnHub</title>
  <meta name="description" content="Admin dashboard for LearnHub — Manage courses and lessons."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><path d='M20 40 L50 20 L80 40 L50 60 Z' fill='white'/></svg>" />
  <style>
    /* ── Admin Specific Styles ── */
    .admin-header {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 3rem 2rem 2.5rem;
    }
    .admin-header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .admin-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .admin-header h1 { font-family: 'Inter', sans-serif; font-size: 2rem; font-weight: 800; margin: 0; }

    .admin-container { max-width: 1200px; margin: 0 auto; padding: 2.5rem 2rem; }

    /* ── Tabs ── */
    .admin-tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border-light); margin-bottom: 2rem; }
    .admin-tab-btn {
      padding: 12px 24px;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .admin-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .admin-tab-btn:hover { color: var(--text); }

    /* ── Toolbar ── */
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .btn-add {
      background: var(--accent);
      color: #fff;
      padding: 10px 24px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow-card);
      transition: all var(--transition);
    }
    .btn-add:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow); }

    /* ── Grid/Table ── */
    .admin-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .admin-item-card {
      background: var(--card-bg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: transform 0.2s, border-color 0.2s;
    }
    .admin-item-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: var(--shadow); }
    .admin-item-card[data-category="Web Development"]:hover { border-color: var(--accent); }
    .admin-item-card[data-category="Programming"]:hover { border-color: var(--color-indigo); }
    .admin-item-card[data-category="Backend"]:hover { border-color: var(--color-emerald); }
    .admin-item-card[data-category="Database"]:hover { border-color: var(--color-amber); }
    .aic-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .aic-category { font-size: 0.72rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
    .aic-title { font-family: 'Inter', sans-serif; font-size: 1.15rem; font-weight: 700; line-height: 1.3; margin-bottom: 0.5rem; }
    .aic-meta { font-size: 0.82rem; color: var(--text-muted); display: flex; gap: 12px; }
    .aic-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn-edit-sm { flex: 1; padding: 8px; border-radius: var(--radius-sm); background: var(--bg3); color: var(--primary); font-weight: 600; font-size: 0.85rem; border: 1px solid var(--border); transition: all 0.2s; }
    .btn-edit-sm:hover { background: var(--primary); color: #fff; }
    .btn-del-sm { padding: 8px 12px; border-radius: var(--radius-sm); background: #fee2e2; color: #dc2626; font-size: 0.85rem; border: 1px solid #fecaca; transition: all 0.2s; }
    .btn-del-sm:hover { background: var(--secondary); color: #fff; }

    /* ── Modal/Form ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 2rem; }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      width: 100%;
      max-width: 800px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2.5rem;
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }
    .modal-close { position: absolute; top: 1.5rem; right: 1.5rem; font-size: 1.5rem; color: var(--text-dim); cursor: pointer; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
    .form-group input, .form-group textarea, .form-group select {
      background: var(--bg3);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--primary); }

    .lesson-manager { margin-top: 2rem; border-top: 1px solid var(--border-light); padding-top: 2rem; }
    .lesson-row { display: grid; grid-template-columns: 40px 1.5fr 100px 2fr 40px; gap: 12px; align-items: center; margin-bottom: 12px; }
    .video-input-group { display: flex; gap: 6px; align-items: center; }
    .video-input-group input { flex: 1; }
    .btn-upload-sm { background: var(--bg3); border: 1px solid var(--border); padding: 8px; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; font-size: 0.9rem; }
    .btn-upload-sm:hover { background: var(--primary); color: #fff; }
    .upload-progress { font-size: 0.7rem; color: var(--accent); font-weight: 600; margin-top: 2px; display: block; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2.5rem; }
  </style>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="nav-logo">LearnHub</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="courses.html">Courses</a></li>
    <li><a href="dashboard.html">My Courses</a></li>
  </ul>
  <button class="hamburger" id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
</nav>

<div class="admin-header" style="padding-top: calc(var(--nav-height) + 2rem);">
  <div class="admin-header-inner">
    <div>
      <div class="admin-badge">Admin Console</div>
      <h1>Content Management</h1>
      <p style="color:var(--text-muted);font-size:0.9rem;margin-top:4px;">Create, update, and manage your course catalog</p>
    </div>
    <button class="btn-add" onclick="openModal()">Create New Course</button>
  </div>
</div>

<div class="admin-container">
  <div class="admin-tabs">
    <button class="admin-tab-btn active" id="tabCourses" onclick="switchTab('courses')">Courses</button>
    <button class="admin-tab-btn" id="tabUsers" onclick="switchTab('users')">Students</button>
  </div>

  <!-- ── COURSES VIEW ── -->
  <div id="coursesView" class="tab-content">
    <div class="toolbar">
      <div class="search-wrapper">
        <input class="search-input" id="courseSearch" placeholder="Search courses..." oninput="renderCourses()"/>
      </div>
    </div>
    <div class="admin-card-grid" id="courseGrid">
      <!-- Loaded via JS -->
    </div>
  </div>

  <!-- ── USERS VIEW ── -->
  <div id="usersView" class="tab-content hidden">
    <div class="admin-card-grid" id="userGrid">
      <!-- Loaded via JS -->
    </div>
  </div>
</div>

<!-- ── COURSE MODAL ── -->
<div class="modal-overlay" id="courseModal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    <h2 id="modalTitle" style="font-family:'Inter',sans-serif;margin-bottom:1.5rem;">Create Course</h2>
    <form id="courseForm">
      <div class="form-grid">
        <div class="form-group full">
          <label>Course Title</label>
          <input type="text" id="fTitle" required placeholder="e.g. Java Mastery 2026"/>
        </div>
        <div class="form-group full">
          <label>Description</label>
          <textarea id="fDesc" rows="3" required placeholder="Write a compelling overview..."></textarea>
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="fCategory" required placeholder="e.g. Programming"/>
        </div>
        <div class="form-group">
          <label>Instructor Name</label>
          <input type="text" id="fInstructor" required placeholder="e.g. Dr. John Doe"/>
        </div>
        <div class="form-group">
          <label>Duration</label>
          <input type="text" id="fDuration" required placeholder="e.g. 10 hours"/>
        </div>
        <div class="form-group">
          <label>Thumbnail URL (or Emoji)</label>
          <input type="text" id="fThumb" placeholder="e.g. 📘 or /img/path.png"/>
        </div>
        <div class="form-group">
          <label>Featured Course?</label>
          <select id="fFeatured">
            <option value="false">No</option>
            <option value="true">Yes (Show on Homepage)</option>
          </select>
        </div>
      </div>

      <div class="lesson-manager">
        <h3 style="font-size:1.1rem;margin-bottom:1rem;">Lessons</h3>
        <div id="lessonRows">
          <!-- Dynamically added rows -->
        </div>
        <button type="button" class="btn-add-lesson" onclick="addLessonRow()">+ Add Lesson</button>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-primary" id="btnSubmit">Save Course</button>
      </div>
    </form>
  </div>
</div>

<footer><div class="footer-logo">LearnHub</div><p>Admin Dashboard &copy; 2026</p></footer>

<div class="toast-container" id="toastContainer"></div>

<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  (async () => {
    await requireAdmin();
    initNavAuth();
    loadData();
  })();
  let editingId = null;
  let lessonCounter = 0;

  async function loadData() {
    try {
      const res = await fetch('/api/admin/courses');
      allCourses = await res.json();
      renderCourses();
    } catch(e) { console.error(e); }
  }

  function renderCourses() {
    const grid = document.getElementById('courseGrid');
    const kw = document.getElementById('courseSearch').value.toLowerCase();
    const filtered = allCourses.filter(c => c.title.toLowerCase().includes(kw) || c.category.toLowerCase().includes(kw));

    grid.innerHTML = filtered.map(c => `
      <div class="admin-item-card" data-category="${c.category}">
        <div class="aic-header">
          <span class="aic-category">${c.category}</span>
          ${c.featured ? '<span>(Featured)</span>' : ''}
        </div>
        <div class="aic-title">${c.title}</div>
        <div class="aic-meta">
          <span>Duration: ${c.duration}</span>
          <span>Instructor: ${c.instructor}</span>
        </div>
        <div class="aic-actions">
          <button class="btn-edit-sm" onclick="openModal(${c.id})">Edit</button>
          <button class="btn-del-sm" onclick="deleteCourse(${c.id})">Del</button>
        </div>
      </div>
    `).join('');
  }

  function openModal(id = null) {
    editingId = id;
    const form = document.getElementById('courseForm');
    form.reset();
    document.getElementById('lessonRows').innerHTML = '';
    
    if (id) {
      const c = allCourses.find(x => x.id === id);
      document.getElementById('modalTitle').textContent = 'Edit Course';
      document.getElementById('fTitle').value = c.title;
      document.getElementById('fDesc').value = c.description;
      document.getElementById('fCategory').value = c.category;
      document.getElementById('fInstructor').value = c.instructor;
      document.getElementById('fDuration').value = c.duration;
      document.getElementById('fThumb').value = c.thumbnailUrl;
      document.getElementById('fFeatured').value = String(c.featured);
      loadLessonsForEdit(id);
    } else {
      document.getElementById('modalTitle').textContent = 'Create Course';
      addLessonRow(); // Start with one empty row
    }
    document.getElementById('courseModal').classList.add('active');
  }

  async function loadLessonsForEdit(courseId) {
    const res = await fetch(`/api/courses/${courseId}`);
    const data = await res.json();
    document.getElementById('lessonRows').innerHTML = ''; // Clear just in case
    if(data.lessons) {
      data.lessons.sort((a,b) => a.lessonOrder - b.lessonOrder).forEach(l => addLessonRow(l));
    }
  }

  function addLessonRow(lesson = null) {
    const container = document.getElementById('lessonRows');
    const div = document.createElement('div');
    div.className = 'lesson-row';
    lessonCounter++;
    const rowId = lessonCounter;
    const order = lesson ? lesson.lessonOrder : container.children.length + 1;

    div.innerHTML = `
      <input type="number" class="l-order" value="${order}" style="width:40px;text-align:center;" />
      <input type="text" class="l-title" value="${lesson ? lesson.title : ''}" placeholder="Lesson title" required />
      <input type="text" class="l-dur" value="${lesson ? lesson.duration : ''}" placeholder="Duration" />
      <div class="video-input-group">
        <div style="flex:1;">
          <input type="text" class="l-video" value="${lesson ? lesson.videoUrl : ''}" placeholder="Video URL or Upload →" />
          <span class="upload-progress" id="up-prog-${rowId}"></span>
        </div>
        <button type="button" class="btn-upload-sm" onclick="triggerUpload(this, ${rowId})" title="Upload Video File">📁</button>
        <input type="file" class="l-file" style="display:none;" onchange="handleFileUpload(this, ${rowId})" accept="video/*" />
      </div>
      <button type="button" class="btn-del-sm" onclick="this.parentElement.remove()" style="padding:4px;">×</button>
    `;
    container.appendChild(div);
  }

  function closeModal() { document.getElementById('courseModal').classList.remove('active'); }

  document.getElementById('courseForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    const courseData = {
      title: document.getElementById('fTitle').value,
      description: document.getElementById('fDesc').value,
      category: document.getElementById('fCategory').value,
      instructor: document.getElementById('fInstructor').value,
      duration: document.getElementById('fDuration').value,
      thumbnailUrl: document.getElementById('fThumb').value,
      featured: document.getElementById('fFeatured').value === 'true',
      totalLessons: document.getElementById('lessonRows').children.length
    };

    const method = editingId ? 'PUT' : 'POST';
    const url = editingId ? `/api/admin/courses/${editingId}` : '/api/admin/courses';

    try {
      const res = await fetch(url, {
        method,
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(courseData)
      });
      const result = await res.json();
      const courseId = editingId || result.id;

      // If editing, clear old lessons first
      if (editingId) {
        await fetch(`/api/admin/courses/${editingId}/lessons`, { method: 'DELETE' });
      }
      
      // Save lessons
      const lessonRows = document.querySelectorAll('.lesson-row');
      const lessonPromises = Array.from(lessonRows).map(row => {
        const lessonData = {
          courseId: courseId,
          title: row.querySelector('.l-title').value,
          lessonOrder: parseInt(row.querySelector('.l-order').value) || 1,
          duration: row.querySelector('.l-dur').value,
          videoUrl: row.querySelector('.l-video').value
        };
        return fetch('/api/admin/lessons', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(lessonData)
        });
      });

      await Promise.all(lessonPromises);
      
      showToast(editingId ? 'Course updated!' : 'Course created!', 'success');
      closeModal();
      loadData();
    } catch(e) { 
      console.error(e);
      showToast('Error saving course', 'error'); 
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Course';
    }
  };

  async function deleteCourse(id) {
    if(!confirm('Are you sure? This will delete the course and all its lessons.')) return;
    await fetch(`/api/admin/courses/${id}`, { method: 'DELETE' });
    showToast('Course deleted', 'info');
    loadData();
  }

  function switchTab(tab) {
    document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
    document.getElementById(tab + 'View').classList.remove('hidden');
    if(tab === 'users') loadUsers();
  }

  async function loadUsers() {
    const res = await fetch('/api/admin/users');
    const users = await res.json();
    document.getElementById('userGrid').innerHTML = users.map(u => `
      <div class="admin-item-card">
        <div class="aic-title">${u.name}</div>
        <div class="aic-meta"><span>Email: ${u.email}</span><span>Role: ${u.role}</span></div>
      </div>
    `).join('');
  }

  function triggerUpload(btn, id) {
    btn.parentElement.querySelector('.l-file').click();
  }

  async function handleFileUpload(input, id) {
    const file = input.files[0];
    if (!file) return;

    const prog = document.getElementById(`up-prog-${id}`);
    const textInput = input.parentElement.querySelector('.l-video');
    
    prog.textContent = '⏳ Uploading...';
    
    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/api/admin/upload', {
        method: 'POST',
        body: formData
      });
      
      if (res.ok) {
        const data = await res.json();
        textInput.value = data.url;
        prog.textContent = '✅ Uploaded';
        prog.style.color = 'var(--accent2)';
        showToast('Video uploaded successfully', 'success');
      } else {
        let msg = 'Upload failed';
        try {
          const data = await res.json();
          msg = data.message || msg;
        } catch(e) { /* not json */ }
        prog.textContent = '❌ ' + (res.status === 413 ? 'Too Large' : 'Failed');
        prog.style.color = 'var(--color-rose)';
        showToast(msg, 'error');
      }
    } catch (err) {
      console.error(err);
      prog.textContent = '❌ Error';
      prog.style.color = 'var(--color-rose)';
      showToast('Network error during upload', 'error');
    }
  }

  loadData();
</script>
</body>
</html>
