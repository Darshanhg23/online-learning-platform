<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — LearnHub</title>
  <meta name="description" content="Login or register to access LearnHub courses and track your learning progress."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>"/>
  <style>
    /* ── Auth Page Styles ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--bg1);
      position: relative;
      overflow: hidden;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      top: -150px; left: -150px;
      pointer-events: none;
    }
    .auth-page::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(67,233,123,0.08) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      pointer-events: none;
    }

    .auth-card {
      background: var(--bg2);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .auth-logo a {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text-primary);
      text-decoration: none;
    }
    .auth-logo span { font-size: 1.8rem; margin-right: 6px; }

    /* Tabs */
    .auth-tabs {
      display: flex;
      background: var(--bg3, rgba(255,255,255,0.04));
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.75rem;
      border: 1px solid var(--border-light);
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      font-size: 0.92rem;
      font-weight: 600;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-tab.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 15px rgba(108,99,255,0.35);
    }

    /* Form */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .auth-form h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      color: var(--text-primary);
    }
    .auth-form p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-dim, #a0aec0);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg1);
      border: 1.5px solid var(--border-light);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    .form-group input::placeholder { color: var(--text-muted); }

    .btn-auth {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #6c63ff, #a29bff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 6px 20px rgba(108,99,255,0.4);
      margin-top: 0.5rem;
    }
    .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(108,99,255,0.5); }
    .btn-auth:disabled { opacity: 0.6; transform: none; cursor: not-allowed; }

    .auth-error {
      background: rgba(255,100,100,0.1);
      border: 1px solid rgba(255,100,100,0.3);
      color: #ff8080;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.86rem;
      margin-bottom: 1rem;
      display: none;
    }
    .auth-success {
      background: rgba(67,233,123,0.1);
      border: 1px solid rgba(67,233,123,0.3);
      color: #43e97b;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.86rem;
      margin-bottom: 1rem;
      display: none;
    }

    .auth-divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 1.25rem 0 0;
    }
    .auth-divider a {
      color: var(--primary-light, #a29bff);
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <a href="index.html"><span>🎓</span>LearnHub</a>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <div class="auth-form active" id="loginForm">
      <h2>Welcome back 👋</h2>
      <p>Sign in to continue your learning journey</p>

      <div class="auth-error" id="loginError"></div>
      <div class="auth-success" id="loginSuccess"></div>

      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
      </div>

      <button class="btn-auth" id="loginBtn" onclick="handleLogin()">🔐 Sign In</button>

      <div class="auth-divider">
        Don't have an account? <a onclick="switchTab('register')">Register free →</a>
      </div>
    </div>

    <!-- ── REGISTER FORM ── -->
    <div class="auth-form" id="registerForm">
      <h2>Create account 🚀</h2>
      <p>Join thousands of learners on LearnHub</p>

      <div class="auth-error" id="registerError"></div>
      <div class="auth-success" id="registerSuccess"></div>

      <div class="form-group">
        <label for="registerName">Full Name</label>
        <input type="text" id="registerName" placeholder="Your name" autocomplete="name"/>
      </div>
      <div class="form-group">
        <label for="registerEmail">Email Address</label>
        <input type="email" id="registerEmail" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-group">
        <label for="registerPassword">Password <span style="font-weight:400;text-transform:none;">(min. 6 chars)</span></label>
        <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password"/>
      </div>

      <button class="btn-auth" id="registerBtn" onclick="handleRegister()">✨ Create Account</button>

      <div class="auth-divider">
        Already have an account? <a onclick="switchTab('login')">Sign in →</a>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/app.js"></script>
<script>
  // ── Tab Switching ─────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    clearMessages();
  }

  function clearMessages() {
    ['loginError','loginSuccess','registerError','registerSuccess'].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.style.display = 'none'; el.textContent = ''; }
    });
  }

  function showMsg(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ── Login ─────────────────────────────────────────────────────────────────
  async function handleLogin() {
    clearMessages();
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn      = document.getElementById('loginBtn');

    if (!email || !password) {
      showMsg('loginError', 'Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Signing in…';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg('loginSuccess', `Welcome back, ${data.name}! Redirecting…`);
        sessionStorage.setItem('learnhub_user', JSON.stringify(data));
        setTimeout(() => window.location.href = 'index.html', 900);
      } else {
        showMsg('loginError', data.message || 'Login failed. Check your credentials.');
        btn.disabled = false;
        btn.textContent = '🔐 Sign In';
      }
    } catch {
      showMsg('loginError', 'Cannot reach server. Is Spring Boot running?');
      btn.disabled = false;
      btn.textContent = '🔐 Sign In';
    }
  }

  // ── Register ──────────────────────────────────────────────────────────────
  async function handleRegister() {
    clearMessages();
    const name     = document.getElementById('registerName').value.trim();
    const email    = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const btn      = document.getElementById('registerBtn');

    if (!name || !email || !password) {
      showMsg('registerError', 'All fields are required.');
      return;
    }
    if (password.length < 6) {
      showMsg('registerError', 'Password must be at least 6 characters.');
      return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ Creating account…';

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();

      if (res.ok) {
        showMsg('registerSuccess', `Account created! Welcome, ${data.name}! Redirecting…`);
        sessionStorage.setItem('learnhub_user', JSON.stringify(data));
        setTimeout(() => window.location.href = 'index.html', 1000);
      } else {
        showMsg('registerError', data.message || 'Registration failed.');
        btn.disabled = false;
        btn.textContent = '✨ Create Account';
      }
    } catch {
      showMsg('registerError', 'Cannot reach server. Is Spring Boot running?');
      btn.disabled = false;
      btn.textContent = '✨ Create Account';
    }
  }

  // ── Enter key support ─────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('loginForm').classList.contains('active');
      loginActive ? handleLogin() : handleRegister();
    }
  });

  // ── If already logged in, skip to home ───────────────────────────────────
  (async () => {
    try {
      const res = await fetch('/api/auth/me', { credentials: 'include' });
      if (res.ok) window.location.href = 'index.html';
    } catch { /* not logged in */ }
  })();
</script>
</body>
</html>
