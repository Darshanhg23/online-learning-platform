spring.application.name=online-learning-platform

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/learning_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# SQL initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

# Server
server.port=8080

# Session cookie settings
server.servlet.session.cookie.same-site=lax

# Logging
logging.level.org.springframework.jdbc=DEBUG

# Multipart File Upload Config
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB